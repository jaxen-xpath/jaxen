name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11', '17', '21', '25' ]

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        id: setup-test-jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # Java 11 and later do not support -source/-target 1.5, so we compile with Java 8
      # but run the tests with the target Java version.
      - name: Set up JDK 8 for compilation
        if: matrix.java != '8'
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin

      - name: Build and test
        if: matrix.java == '8'
        run: mvn --batch-mode test

      - name: Compile with Java 8 and run tests with Java ${{ matrix.java }}
        if: matrix.java != '8'
        run: mvn --batch-mode test -Djvm=${{ steps.setup-test-jdk.outputs.path }}/bin/java

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-java-${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  site:
    name: Build Maven Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven

      - name: Build site
        run: mvn --batch-mode site -Djapicmp.skip=true
