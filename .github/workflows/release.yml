name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Version to release (e.g. 2.0.1)'
        required: true
        type: string
      developmentVersion:
        description: 'Next development version after the release (e.g. 2.0.2-SNAPSHOT)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release ${{ inputs.releaseVersion }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # If RELEASE_TOKEN is defined we use it; otherwise the workflow uses GITHUB_TOKEN.
          # The workflow now pushes a release branch and opens a PR to protected master.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
          # Configures settings.xml with the Central Publishing Portal server entry so
          # Maven can authenticate when deploying artifacts.
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mvn --batch-mode versions:set \
            -DnewVersion=${{ inputs.releaseVersion }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true
          # Update the reproducible-build timestamp to the current moment.
          sed -i "s|<project.build.outputTimestamp>.*</project.build.outputTimestamp>|<project.build.outputTimestamp>${TIMESTAMP}</project.build.outputTimestamp>|" pom.xml

      - name: Update README.md with release version
        run: |
          sed -i "s|The current version is \*[^*]*\*|The current version is *${{ inputs.releaseVersion }}*|" README.md
          # Update only the <version> tag that follows the jaxen <artifactId> line
          sed -i '/<artifactId>jaxen<\/artifactId>/{n;s|<version>[^<]*</version>|<version>${{ inputs.releaseVersion }}</version>|}' README.md
          sed -i "s|compile 'jaxen:jaxen:[^']*'|compile 'jaxen:jaxen:${{ inputs.releaseVersion }}'|" README.md

      - name: Update index.xml files with release version
        run: |
          sed -i "s|The current version is <strong>[^<]*</strong>|The current version is <strong>${{ inputs.releaseVersion }}</strong>|" src/site/xdoc/index.xml
          sed -i '/<artifactId>jaxen<\/artifactId>/{n;s|<version>[^<]*</version>|<version>${{ inputs.releaseVersion }}</version>|}' src/site/xdoc/index.xml
          sed -i "s|compile 'jaxen:jaxen:[^']*'|compile 'jaxen:jaxen:${{ inputs.releaseVersion }}'|" src/site/xdoc/index.xml

      - name: Run tests
        run: mvn --batch-mode test

      - name: Build, sign, and deploy jaxen-parent and core artifacts to Central Publishing Portal
        run: mvn --batch-mode -pl .,core deploy -Prelease -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN:    ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE:   ${{ secrets.GPG_PASSPHRASE }}

      - name: Commit release version and tag
        run: |
          git add pom.xml core/pom.xml integration-tests/pom.xml README.md src/site/xdoc/index.xml
          git commit -m "Release ${{ inputs.releaseVersion }}"
          git tag -a "v${{ inputs.releaseVersion }}" -m "Release ${{ inputs.releaseVersion }}"

      - name: Set next development version
        run: |
          mvn --batch-mode versions:set \
            -DnewVersion=${{ inputs.developmentVersion }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Commit next development version
        run: |
          git add pom.xml core/pom.xml integration-tests/pom.xml
          git commit -m "Prepare for next development iteration ${{ inputs.developmentVersion }}"

      - name: Push tag and release branch
        run: |
          git push origin "v${{ inputs.releaseVersion }}"
          git push origin HEAD:"release/${{ inputs.releaseVersion }}"

      - name: Create pull request for next development iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BRANCH="release/${{ inputs.releaseVersion }}"
          EXISTING_PR="$(gh pr list --base master --head "${RELEASE_BRANCH}" --state open --json number --jq '.[0].number')"

          if [ -n "${EXISTING_PR}" ]; then
            echo "Pull request #${EXISTING_PR} already exists for ${RELEASE_BRANCH}"
          else
            PR_BODY=$(printf '%s\n\n%s\n\n%s' \
              "This PR was opened automatically by the release workflow after deploying version ${{ inputs.releaseVersion }} to the [Central Publishing Portal](https://central.sonatype.com/publishing/deployments)." \
              "It includes the release commit and the post-release version bump to ${{ inputs.developmentVersion }}." \
              "Before merging this PR, publish the release in the [Central Publishing Portal](https://central.sonatype.com/publishing/deployments).")
            gh pr create \
              --base master \
              --head "${RELEASE_BRANCH}" \
              --title "Release ${{ inputs.releaseVersion }}: commit release and prepare ${{ inputs.developmentVersion }}" \
              --body "${PR_BODY}"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.releaseVersion }}" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-src.zip" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-src.tar.gz" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-src.tar.bz2" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-core-src.zip" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-bin.zip" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-bin.tar.gz" \
            "core/target/jaxen-${{ inputs.releaseVersion }}-bin.tar.bz2" \
            --title "${{ inputs.releaseVersion }}" \
            --generate-notes \
            --verify-tag
