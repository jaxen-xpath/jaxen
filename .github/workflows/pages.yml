name: Deploy Site to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Maven Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build site
        run: mvn --batch-mode site site:stage -Dmaven.javadoc.skip=true -Djapicmp.skip=true

      - name: Remove JavaScript from published pages
        run: |
          python - <<'PY'
          import pathlib
          import re
          for html in pathlib.Path("target/staging").rglob("*.html"):
              content = html.read_text(encoding="utf-8")
              content = re.sub(r"(?is)<script\\b[^>]*>.*?</script>", "", content)
              html.write_text(content, encoding="utf-8")
          PY
          find target/staging -type d -name js -prune -exec rm -rf {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/staging/

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
