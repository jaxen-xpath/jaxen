      # -----------------------------------------------------------------------
      # Remove this workflow file so it never runs again
      # -----------------------------------------------------------------------

      - name: Delete this workflow file
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Rebase onto the current master tip to avoid push rejection when
          # other commits landed between checkout and now.
          git fetch origin master
          git rebase origin/master
          git rm .github/workflows/create-todo-issues.yml
          git commit -m "Remove one-shot TODO issue creation workflow [skip ci]"
          git push origin HEAD:master
