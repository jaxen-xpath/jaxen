name: Create Issues from TODO Comments

# Triggered whenever this file is pushed to master (e.g. when this PR is
# merged).  It creates one GitHub issue per TODO/FIXME/XXX comment and then
# deletes itself from master so it never runs again.  The one-shot behaviour
# relies on the self-deletion step succeeding; each issue-creation step is
# idempotent (safe to re-run if the deletion push ever fails).
on:
  push:
    branches: [master]
    paths:
      - .github/workflows/create-todo-issues.yml

permissions:
  contents: write
  issues: write

jobs:
  create-todo-issues:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure 'todo' label exists
        run: |
          gh label create todo \
            --description "Tracked TODO/FIXME/XXX comment from source code" \
            --color e4e669 \
          || true

      # -----------------------------------------------------------------------
      # One step per TODO/FIXME/XXX comment found in the source tree
      # -----------------------------------------------------------------------

      - name: "XXX: SimpleNamespaceContext.java line 65"
        env:
          BODY: |
            ## `XXX` comment in source code

            **File:** `core/src/java/main/org/jaxen/SimpleNamespaceContext.java`
            **Line:** 65

            ### Source context

            ```java
                // XXX should this prebind the xml prefix?
                private Map<String, String> namespaces;
            ```
        run: |
          gh issue create \
            --title "XXX: core/src/java/main/org/jaxen/SimpleNamespaceContext.java line 65" \
            --label "todo" \
            --body "$BODY" || true

      - name: "FIXME: DocumentNavigator.java line 881"
        env:
